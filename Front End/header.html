<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="heritage-palette.css" />

    <title>Mati Heritage Explorer</title>

    <style>
      :root {
        --header-h: 5.625rem;
        --header-h-scrolled: 4.875rem;
        --header-ease: cubic-bezier(0.22, 1, 0.36, 1);
        --hdr-ink: #0c1a14;
        --hdr-muted: #5c6b63;
        --hdr-line: rgba(12, 26, 20, 0.09);
        --hdr-dock: rgba(255, 255, 255, 0.58);
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 100;
        height: var(--header-h);
        transition: height 0.45s var(--header-ease);
      }

      .site-header.is-scrolled {
        height: var(--header-h-scrolled);
      }

      /* Scroll progress */
      .header-scroll-progress {
        position: absolute;
        top: 0;
        left: 0;
        height: 3px;
        width: 0%;
        z-index: 20;
        background: linear-gradient(90deg, var(--forest), var(--sky), var(--amber));
        box-shadow: 0 0 12px rgba(4, 120, 87, 0.45);
        transition: width 0.08s linear;
        border-radius: 0 2px 2px 0;
      }

      .header-bg {
        position: relative;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.96) 0%,
          rgba(236, 253, 245, 0.9) 100%
        );
        border-bottom: 1px solid var(--hdr-line);
        backdrop-filter: blur(28px) saturate(1.4);
        -webkit-backdrop-filter: blur(28px) saturate(1.4);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.98) inset,
          0 16px 48px rgba(4, 120, 87, 0.05);
        transition: box-shadow 0.45s ease, background 0.45s ease;
      }

      .site-header.is-scrolled .header-bg {
        background: rgba(255, 255, 255, 0.97);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 1) inset,
          0 12px 40px rgba(12, 26, 20, 0.08);
      }

      /* ── Heritage scene ── */
      .header-scene {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
        mask-image: linear-gradient(to top, black 0%, black 55%, transparent 94%);
        -webkit-mask-image: linear-gradient(to top, black 0%, black 55%, transparent 94%);
      }

      .header-scene__mesh {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 85% at 90% 115%, rgba(2, 132, 199, 0.22) 0%, transparent 55%),
          radial-gradient(ellipse 50% 75% at 8% 108%, rgba(4, 120, 87, 0.24) 0%, transparent 52%),
          radial-gradient(ellipse 35% 45% at 70% 6%, rgba(251, 191, 36, 0.16) 0%, transparent 68%),
          radial-gradient(ellipse 25% 30% at 25% 15%, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
        animation: hdr-mesh-shift 16s ease-in-out infinite alternate;
      }

      @keyframes hdr-mesh-shift {
        0% { opacity: 0.88; transform: scale(1) translateX(0); }
        100% { opacity: 1; transform: scale(1.04) translateX(-1.5%); }
      }

      .header-scene__rays {
        position: absolute;
        top: 8%;
        right: 10%;
        width: 6rem;
        height: 6rem;
        background: conic-gradient(
          from 200deg,
          transparent 0deg,
          rgba(251, 191, 36, 0.07) 30deg,
          transparent 60deg,
          rgba(251, 191, 36, 0.05) 90deg,
          transparent 120deg,
          rgba(251, 191, 36, 0.06) 150deg,
          transparent 180deg
        );
        animation: hdr-rays-spin 40s linear infinite;
        opacity: 0.8;
      }

      @keyframes hdr-rays-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .header-scene__sun {
        position: absolute;
        top: 16%;
        right: 12%;
        width: 4rem;
        height: 4rem;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(251, 191, 36, 0.42) 0%, rgba(251, 191, 36, 0) 68%);
        animation: hdr-sun-pulse 5s ease-in-out infinite;
      }

      @keyframes hdr-sun-pulse {
        0%, 100% { transform: scale(1); opacity: 0.75; }
        50% { transform: scale(1.15); opacity: 1; }
      }

      .header-scene__cloud {
        position: absolute;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.62);
        filter: blur(1.5px);
        animation: hdr-cloud-drift linear infinite;
      }

      .header-scene__cloud::before,
      .header-scene__cloud::after {
        content: "";
        position: absolute;
        border-radius: 9999px;
        background: inherit;
      }

      .header-scene__cloud--1 {
        top: 20%;
        left: -10%;
        width: 5.5rem;
        height: 1.2rem;
        animation-duration: 42s;
      }

      .header-scene__cloud--1::before {
        width: 2rem; height: 1.4rem; top: -0.5rem; left: 1rem;
      }

      .header-scene__cloud--2 {
        top: 30%;
        left: -14%;
        width: 4rem;
        height: 1rem;
        animation-duration: 56s;
        animation-delay: -22s;
        opacity: 0.75;
      }

      .header-scene__cloud--3 {
        top: 14%;
        left: -8%;
        width: 3rem;
        height: 0.75rem;
        animation-duration: 68s;
        animation-delay: -40s;
        opacity: 0.55;
      }

      @keyframes hdr-cloud-drift {
        0% { transform: translateX(0); }
        100% { transform: translateX(calc(100vw + 16rem)); }
      }

      .header-scene__particles span {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(251, 191, 36, 0.55);
        animation: hdr-particle 6s ease-in-out infinite;
      }

      .header-scene__particles span:nth-child(1) { top: 35%; left: 18%; animation-delay: 0s; }
      .header-scene__particles span:nth-child(2) { top: 28%; left: 42%; animation-delay: -2s; width: 2px; height: 2px; }
      .header-scene__particles span:nth-child(3) { top: 40%; left: 65%; animation-delay: -4s; }
      .header-scene__particles span:nth-child(4) { top: 22%; left: 78%; animation-delay: -1s; width: 2px; height: 2px; }

      @keyframes hdr-particle {
        0%, 100% { opacity: 0; transform: translateY(0); }
        50% { opacity: 0.8; transform: translateY(-6px); }
      }

      .header-scene__svg {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 82%;
        opacity: 0.78;
        will-change: transform;
        transition: opacity 0.45s ease;
      }

      .site-header.is-scrolled .header-scene__svg {
        opacity: 0.32;
      }

      .header-scene__fade {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.94) 0%,
          rgba(255, 255, 255, 0.8) 45%,
          rgba(236, 253, 245, 0.28) 100%
        );
      }

      .header-scene__mist {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 50%;
        background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.42));
        animation: hdr-mist 11s ease-in-out infinite alternate;
      }

      @keyframes hdr-mist {
        0% { opacity: 0.35; transform: translateX(0); }
        100% { opacity: 0.7; transform: translateX(-1%); }
      }

      .hdr-palm { transform-origin: bottom center; animation: hdr-palm-sway 4.5s ease-in-out infinite; }
      .hdr-palm--2 { animation-delay: -2.2s; }
      .hdr-palm--3 { animation-delay: -1s; opacity: 0.45; }
      @keyframes hdr-palm-sway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(1.5deg); }
      }

      .hdr-wave-1 { animation: hdr-wave-a 3.5s ease-in-out infinite; }
      .hdr-wave-2 { animation: hdr-wave-b 4.2s ease-in-out infinite; animation-delay: -1.5s; }

      @keyframes hdr-wave-a {
        0%, 100% { transform: translateX(0); opacity: 0.5; }
        50% { transform: translateX(-8px); opacity: 0.75; }
      }

      @keyframes hdr-wave-b {
        0%, 100% { transform: translateX(0); opacity: 0.3; }
        50% { transform: translateX(6px); opacity: 0.5; }
      }

      .hdr-bird { animation: hdr-bird-fly 24s linear infinite; }
      .hdr-bird--2 { animation-delay: -12s; animation-duration: 28s; }

      @keyframes hdr-bird-fly {
        0% { transform: translate(0, 0); opacity: 0; }
        4% { opacity: 0.65; }
        96% { opacity: 0.65; }
        100% { transform: translate(200px, -14px); opacity: 0; }
      }

      body:not(.visitor-module) .header-scene {
        display: none;
      }

      .header-accent-line {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 2px;
        z-index: 1;
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--forest-dark) 8%,
          var(--forest) 25%,
          var(--amber) 50%,
          var(--sky) 75%,
          #0369a1 92%,
          transparent 100%
        );
        background-size: 200% 100%;
        animation: hdr-accent-flow 7s linear infinite;
      }

      @keyframes hdr-accent-flow {
        0% { background-position: 100% 0; }
        100% { background-position: -100% 0; }
      }

      .header-shimmer {
        position: absolute;
        inset: 0;
        z-index: 1;
        background: linear-gradient(105deg, transparent 38%, rgba(255, 255, 255, 0.4) 50%, transparent 62%);
        transform: translateX(-130%);
        animation: hdr-shimmer 10s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes hdr-shimmer {
        0%, 65%, 100% { transform: translateX(-130%); }
        82% { transform: translateX(130%); }
      }

      /* ── Bar ── */
      .site-header__bar {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: minmax(0, auto) 1fr minmax(0, auto);
        align-items: center;
        gap: clamp(0.75rem, 2vw, 2rem);
        height: 100%;
        max-width: 94rem;
        margin: 0 auto;
        padding: 0 clamp(1.25rem, 3vw, 2.5rem);
      }

      @media (max-width: 1023px) {
        .site-header__bar { grid-template-columns: 1fr auto; }
      }

      /* ── Brand ── */
      .site-brand {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        min-width: 0;
        text-decoration: none;
        color: inherit;
        flex-shrink: 0;
      }

      .site-brand__mark {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 3.25rem;
        height: 3.25rem;
        border-radius: 0.9rem;
        background: linear-gradient(145deg, #fff 0%, #ecfdf5 100%);
        border: 1px solid rgba(4, 120, 87, 0.24);
        box-shadow: 0 6px 20px rgba(4, 120, 87, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.98);
        transition: transform 0.4s var(--header-ease), box-shadow 0.4s ease;
      }

      .site-brand__mark::before {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 1rem;
        background: linear-gradient(135deg, var(--forest), var(--sky), var(--amber));
        z-index: -1;
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .site-brand__mark::after {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 1.1rem;
        border: 1px solid rgba(4, 120, 87, 0.15);
        opacity: 0;
        animation: hdr-mark-ring 3s ease-in-out infinite;
      }

      @keyframes hdr-mark-ring {
        0%, 100% { opacity: 0; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.04); }
      }

      .site-brand:hover .site-brand__mark {
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 12px 32px rgba(4, 120, 87, 0.2);
      }

      .site-brand:hover .site-brand__mark::before { opacity: 0.65; }

      .site-brand__mark svg {
        width: 1.55rem;
        height: 1.55rem;
        color: var(--forest-dark);
        transition: transform 0.4s var(--header-ease);
      }

      .site-brand:hover .site-brand__mark svg { transform: scale(1.06); }

      .site-brand__text {
        display: flex;
        flex-direction: column;
        gap: 0.28rem;
        min-width: 0;
      }

      .site-brand__title {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(1.4rem, 2.5vw, 1.75rem);
        font-weight: 700;
        letter-spacing: 0.015em;
        line-height: 1;
        color: var(--hdr-ink);
        white-space: nowrap;
        transition: background 0.4s ease, color 0.3s ease;
      }

      .site-brand:hover .site-brand__title {
        background: linear-gradient(90deg, var(--forest-dark), var(--sky), var(--forest));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .site-brand__meta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .site-brand__tagline {
        font-family: "Source Sans 3", sans-serif;
        font-size: 0.625rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--hdr-muted);
        white-space: nowrap;
      }

      .site-brand__locale {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.15rem 0.5rem;
        border-radius: 9999px;
        font-family: "Source Sans 3", sans-serif;
        font-size: 0.5625rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--forest-dark);
        background: rgba(4, 120, 87, 0.08);
        border: 1px solid rgba(4, 120, 87, 0.14);
        white-space: nowrap;
      }

      .site-brand__locale-dot {
        width: 0.3rem;
        height: 0.3rem;
        border-radius: 50%;
        background: var(--forest);
        box-shadow: 0 0 6px var(--glow-emerald);
      }

      @media (max-width: 640px) {
        .site-brand__locale { display: none; }
      }

      /* ── Nav dock ── */
      .site-nav {
        display: none;
        position: relative;
        align-items: center;
        justify-self: center;
        padding: 0.32rem;
        border-radius: 9999px;
        background: var(--hdr-dock);
        border: 1px solid rgba(255, 255, 255, 0.82);
        box-shadow:
          0 6px 32px rgba(12, 26, 20, 0.07),
          0 0 0 1px rgba(4, 120, 87, 0.04),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .site-nav::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 9999px;
        background: linear-gradient(135deg, rgba(4, 120, 87, 0.12), rgba(2, 132, 199, 0.08), rgba(245, 158, 11, 0.06));
        z-index: -1;
        opacity: 0;
        transition: opacity 0.35s ease;
      }

      .site-nav:hover::before { opacity: 1; }

      @media (min-width: 1024px) {
        .site-nav { display: flex; }
      }

      .site-nav__indicator {
        position: absolute;
        top: 0.32rem;
        left: 0;
        height: calc(100% - 0.64rem);
        border-radius: 9999px;
        background: linear-gradient(180deg, #fff 0%, #f8fafc 100%);
        border: 1px solid rgba(4, 120, 87, 0.14);
        box-shadow:
          0 6px 20px rgba(4, 120, 87, 0.12),
          0 0 0 1px rgba(255, 255, 255, 0.8) inset,
          0 0 24px rgba(4, 120, 87, 0.08);
        pointer-events: none;
        opacity: 0;
        transform: translateX(0);
        transition: transform 0.45s var(--header-ease), width 0.45s var(--header-ease), opacity 0.25s ease;
        z-index: 0;
      }

      .site-nav.has-indicator .site-nav__indicator { opacity: 1; }

      .site-nav__link {
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.65rem 1.15rem;
        font-family: "Source Sans 3", sans-serif;
        font-size: 1.025rem;
        font-weight: 500;
        letter-spacing: 0.015em;
        text-decoration: none;
        color: var(--hdr-muted);
        white-space: nowrap;
        border-radius: 9999px;
        transition: color 0.25s ease, transform 0.3s var(--header-ease);
      }

      .site-nav__link:hover { color: var(--hdr-ink); transform: translateY(-1px); }

      .site-nav__icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 1.1rem;
        height: 1.1rem;
        opacity: 0.72;
        transition: opacity 0.25s ease, transform 0.35s var(--header-ease), color 0.25s ease;
      }

      .site-nav__icon svg { width: 100%; height: 100%; }

      .site-nav__link:hover .site-nav__icon {
        opacity: 1;
        transform: scale(1.1) rotate(-3deg);
      }

      .site-nav__link.is-active {
        color: var(--hdr-ink);
        font-weight: 600;
      }

      .site-nav__link.is-active .site-nav__icon {
        opacity: 1;
        color: var(--forest);
      }

      .site-nav__chip {
        display: inline-flex;
        align-items: center;
        padding: 0.1rem 0.4rem;
        margin-left: 0.15rem;
        border-radius: 9999px;
        font-size: 0.5625rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--sky);
        background: rgba(2, 132, 199, 0.1);
        border: 1px solid rgba(2, 132, 199, 0.18);
        transition: all 0.3s ease;
      }

      .site-nav__link--featured.is-active {
        color: var(--forest-dark);
        background: linear-gradient(135deg, rgba(4, 120, 87, 0.14), rgba(2, 132, 199, 0.12));
        border: 1px solid rgba(4, 120, 87, 0.2);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85), 0 0 20px rgba(4, 120, 87, 0.1);
      }

      .site-nav__link--featured.is-active .site-nav__chip {
        color: #fff;
        background: linear-gradient(135deg, var(--forest), var(--sky));
        border-color: transparent;
        box-shadow: 0 2px 8px rgba(4, 120, 87, 0.3);
      }

      .site-nav__link--featured.is-active .site-nav__icon { color: var(--sky); }

      /* ── End ── */
      .site-header__end {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        justify-self: end;
      }

      .site-header__utilities {
        display: none;
        align-items: center;
        gap: 0.65rem;
      }

      @media (min-width: 1024px) {
        .site-header__utilities { display: flex; }
      }

      .header-points-badge {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.48rem 0.9rem;
        border-radius: 9999px;
        border: 1px solid var(--hdr-line);
        background: rgba(255, 255, 255, 0.88);
        font-family: "Source Sans 3", sans-serif;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.98);
        transition: box-shadow 0.25s ease, transform 0.25s ease;
      }

      .header-points-badge:hover {
        box-shadow: 0 4px 16px rgba(4, 120, 87, 0.1);
        transform: translateY(-1px);
      }

      .header-points-dot {
        width: 0.42rem;
        height: 0.42rem;
        border-radius: 50%;
        background: var(--forest);
        box-shadow: 0 0 10px var(--glow-emerald);
        animation: hdr-dot-pulse 2.2s ease-in-out infinite;
      }

      @keyframes hdr-dot-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.85); }
      }

      .header-points-label {
        font-size: 0.625rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--hdr-muted);
      }

      #header-total-points {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--hdr-ink);
        font-variant-numeric: tabular-nums;
      }

      .site-profile { position: relative; }

      .site-profile__trigger {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.2rem 0.42rem 0.2rem 0.2rem;
        border-radius: 9999px;
        border: 1px solid var(--hdr-line);
        background: rgba(255, 255, 255, 0.92);
        cursor: pointer;
        transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.98);
      }

      .site-profile__trigger:hover {
        border-color: rgba(4, 120, 87, 0.3);
        box-shadow: 0 6px 20px rgba(4, 120, 87, 0.12);
        transform: translateY(-1px);
      }

      .site-profile__avatar {
        width: 2.4rem;
        height: 2.4rem;
        border-radius: 50%;
        border: 2px solid rgba(4, 120, 87, 0.18);
        object-fit: cover;
      }

      .site-profile__chevron {
        width: 0.85rem;
        height: 0.85rem;
        margin-right: 0.15rem;
        color: var(--hdr-muted);
        transition: transform 0.28s var(--header-ease);
      }

      .site-profile:hover .site-profile__chevron,
      .site-profile.is-open .site-profile__chevron {
        transform: rotate(180deg);
      }

      .header-dropdown {
        position: absolute;
        right: 0;
        top: calc(100% + 0.55rem);
        min-width: 13.5rem;
        padding: 0.45rem;
        border-radius: 0.85rem;
        border: 1px solid var(--hdr-line);
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        box-shadow: 0 24px 56px rgba(12, 26, 20, 0.14);
        opacity: 0;
        visibility: hidden;
        transform: translateY(0.5rem) scale(0.97);
        transition: all 0.3s var(--header-ease);
        z-index: 60;
      }

      .site-profile:hover .header-dropdown,
      .site-profile.is-open .header-dropdown {
        opacity: 1;
        visibility: visible;

      .switch { position: relative; display: inline-block; width: 50px; height: 24px; }

      .switch input {
        opacity: 0;
        width: 100%;
        height: 100%;
        position: absolute;
        cursor: pointer;
        z-index: 2;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background-color: rgba(255, 255, 255, 0.1);
        transition: 0.4s;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 4px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: var(--forest);
        border-color: var(--forest);
      }

      input:checked + .slider:before { transform: translateX(26px); }

          <div class="space-y-6">
            <div class="flex flex-col gap-2">
              <div class="flex items-center justify-between">
                <span class="text-gray-200 text-base font-semibold tracking-wide">Background Music</span>
                <span id="music-vol-text" class="header-accent-text text-sm font-bold">20%</span>
              </div>
              <input type="range" id="music-volume" min="0" max="1" step="0.01" class="w-full h-1.5 bg-white/10 rounded-lg appearance-none cursor-pointer" />
            </div>
            <div class="flex items-center justify-between">
              <span class="text-gray-200 text-base font-semibold tracking-wide">Language</span>
              <select id="language-select" class="bg-white/5 border border-white/20 text-white text-base rounded-lg p-2 focus:ring-2 outline-none">
                <option value="en" class="header-panel">English</option>
                <option value="ceb" class="header-panel">Cebuano</option>
                <option value="fil" class="header-panel">Filipino</option>
              </select>
            </div>
            <div class="flex flex-col gap-2">
              <div class="flex items-center justify-between">
                <span class="text-gray-200 text-base font-semibold tracking-wide">Sound Effects</span>
                <span id="sfx-vol-text" class="header-accent-text text-sm font-bold">80%</span>
              </div>
              <input type="range" id="sfx-volume" min="0" max="1" step="0.01" class="w-full h-1.5 bg-white/10 rounded-lg appearance-none cursor-pointer" />
            </div>
          </div>
          <button id="save-settings" class="w-full mt-10 py-4 settings-save-btn rounded-xl text-white font-bold tracking-widest uppercase text-base">Save Changes</button>
        </div>
      </div>
    </header>

    <script>
      window.initGlobalSettings = function () {
        const modal = document.getElementById("settings-modal");
        const musicSlider = document.getElementById("music-volume");
        const sfxSlider = document.getElementById("sfx-volume");
        const musicVolText = document.getElementById("music-vol-text");
        const sfxVolText = document.getElementById("sfx-vol-text");
        const langSelect = document.getElementById("language-select");
        const settingsLink = document.getElementById("settings-link");
        const saveBtn = document.getElementById("save-settings");
        const sfxIds = ["click-sound", "announcer-voice", "correct-sfx", "wrong-sfx", "tetris-fall-sound", "tetris-boom-sound"];

        const loadPrefs = () => {
          const mVol = parseFloat(localStorage.getItem("bgMusicVol") || "0.2");
          const sVol = parseFloat(localStorage.getItem("sfxVol") || "0.8");
          const lang = localStorage.getItem("appLanguage") || "en";
          if (musicSlider) musicSlider.value = mVol;
          if (sfxSlider) sfxSlider.value = sVol;
          if (musicVolText) musicVolText.textContent = Math.round(mVol * 100) + "%";
          if (sfxVolText) sfxVolText.textContent = Math.round(sVol * 100) + "%";
          if (langSelect) langSelect.value = lang;
          const applyVolumes = () => {
            const bg = document.getElementById("bg-music");
            if (bg) bg.volume = mVol;
            sfxIds.forEach((id) => {
              const sfx = document.getElementById(id);
              if (sfx) sfx.volume = sVol;
            });
          };
          if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", applyVolumes);
          else applyVolumes();
        };

        if (settingsLink) {
          settingsLink.onclick = (e) => {
            e.preventDefault();
            if (modal) modal.classList.replace("hidden", "flex");
          };
        }

        const closeModal = () => modal && modal.classList.replace("flex", "hidden");
        const closeBtn = document.getElementById("close-settings");
        if (closeBtn) closeBtn.onclick = closeModal;
        if (modal) modal.onclick = (e) => e.target === modal && closeModal();

        if (musicSlider) {
          musicSlider.oninput = (e) => {
            const val = e.target.value;
            if (musicVolText) musicVolText.textContent = Math.round(val * 100) + "%";
            const bg = document.getElementById("bg-music");
            if (bg) bg.volume = val;
          };
        }

        if (sfxSlider) {
          sfxSlider.oninput = (e) => {
            const val = e.target.value;
            if (sfxVolText) sfxVolText.textContent = Math.round(val * 100) + "%";
            sfxIds.forEach((id) => {
              const sfx = document.getElementById(id);
              if (sfx) sfx.volume = val;
            });
            const preview = document.getElementById("click-sound");
            if (preview && val > 0) {
              preview.currentTime = 0;
              preview.play().catch(() => {});
            }
          };
        }

        if (saveBtn) {
          saveBtn.onclick = () => {
            if (musicSlider) localStorage.setItem("bgMusicVol", musicSlider.value);
            if (sfxSlider) localStorage.setItem("sfxVol", sfxSlider.value);
            if (langSelect) localStorage.setItem("appLanguage", langSelect.value);
            closeModal();
          };
        }

        loadPrefs();
      };

      window.initSiteHeader = function () {
        const header = document.getElementById("site-header");
        const nav = document.getElementById("site-nav");
        const indicator = document.getElementById("site-nav-indicator");
        const toggle = document.getElementById("site-nav-toggle");
        const mobileNav = document.getElementById("site-mobile-nav");
        const mobileLinksWrap = document.getElementById("site-mobile-nav-links");
        const scrollProgress = document.getElementById("header-scroll-progress");
        const sceneSvg = document.getElementById("header-scene-svg");

        if (!header) return;

        const moveIndicator = (link) => {
          if (!nav || !indicator || !link) return;
          if (
            link.classList.contains("site-nav__link--featured") &&
            link.classList.contains("is-active")
          ) {
            indicator.style.opacity = "0";
            nav.classList.remove("has-indicator");
            return;
          }
          const navRect = nav.getBoundingClientRect();
          const linkRect = link.getBoundingClientRect();
          indicator.style.width = linkRect.width + "px";
          indicator.style.transform = `translateX(${linkRect.left - navRect.left}px)`;
          nav.classList.add("has-indicator");
          indicator.style.opacity = "1";
        };

        const activeLink = document.querySelector(".site-nav__link.is-active");
        if (activeLink) moveIndicator(activeLink);

        document.querySelectorAll(".site-nav__link").forEach((link) => {
          link.addEventListener("mouseenter", () => moveIndicator(link));
          link.addEventListener("focus", () => moveIndicator(link));
        });

        if (nav) {
          nav.addEventListener("mouseleave", () => {
            const active = document.querySelector(".site-nav__link.is-active");
            if (active) moveIndicator(active);
            else {
              nav.classList.remove("has-indicator");
              indicator.style.opacity = "0";
            }
          });
        }

        window.addEventListener("resize", () => {
          const active = document.querySelector(".site-nav__link.is-active");
          if (active) moveIndicator(active);
        });

        const syncMobileLinks = () => {
          if (!mobileLinksWrap) return;
          mobileLinksWrap.innerHTML = "";
          document.querySelectorAll(".site-nav__link").forEach((link) => {
            const clone = link.cloneNode(true);
            clone.classList.remove("site-nav__link", "site-nav__link--featured");
            clone.classList.add("site-mobile-nav__link");
            if (link.classList.contains("is-active")) clone.classList.add("is-active");
            clone.addEventListener("click", closeMobileMenu);
            mobileLinksWrap.appendChild(clone);
          });
        };

        const setMenuOpen = (open) => {
          header.classList.toggle("is-menu-open", open);
          if (toggle) {
            toggle.setAttribute("aria-expanded", open ? "true" : "false");
            toggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
          }
          if (mobileNav) mobileNav.hidden = !open;
          document.body.style.overflow = open ? "hidden" : "";
        };

        const closeMobileMenu = () => setMenuOpen(false);

        if (toggle) {
          toggle.addEventListener("click", () => {
            header.classList.contains("is-menu-open") ? closeMobileMenu() : setMenuOpen(true);
          });
        }

        window.addEventListener("scroll", () => {
          const y = window.scrollY;
          header.classList.toggle("is-scrolled", y > 12);

          if (scrollProgress) {
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            scrollProgress.style.width = docHeight > 0 ? `${Math.min((y / docHeight) * 100, 100)}%` : "0%";
          }

          if (sceneSvg && document.body.classList.contains("visitor-module")) {
            sceneSvg.style.transform = `translateY(${Math.min(y * 0.12, 10)}px)`;
          }
        }, { passive: true });

        window.addEventListener("resize", () => {
          if (window.innerWidth >= 1024) closeMobileMenu();
        });

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeMobileMenu();
        });

        syncMobileLinks();
      };

      initGlobalSettings();
      initSiteHeader();
    </script>
  </body>
</html>
