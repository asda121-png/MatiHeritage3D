<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mati Heritage 3D — Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="heritage-palette.css" />
    <link rel="stylesheet" href="gallery-page.css" />
  </head>
  <body class="gal-page visitor-module antialiased overflow-x-hidden">
    <div id="header-placeholder" class="min-h-[90px] relative z-50"></div>

    <div class="gal-ambient" aria-hidden="true">
      <div class="gal-ambient-gradient"></div>
      <div class="gal-ambient-pattern"></div>
      <div class="gal-ambient-orbs"><span></span><span></span><span></span></div>
    </div>

    <!-- Gallery header -->
    <header class="gal-hero gal-hero--loading">
      <div class="gal-hero-stage">
      <div class="gal-hero-media gal-hero-media--tl" aria-hidden="true">
        <img src="data/GALLERY/Background2.jpg" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-media gal-hero-media--f" aria-hidden="true">
        <img src="data/GALLERY/f.png" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-media gal-hero-media--tr" aria-hidden="true">
        <img src="data/GALLERY/drum.jpg" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-media gal-hero-media--z" aria-hidden="true">
        <img src="data/GALLERY/z.jpg" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-media gal-hero-media--tm" aria-hidden="true">
        <img src="data/GALLERY/Pujada Isalnd.JPG" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-media gal-hero-media--br" aria-hidden="true">
        <img src="data/GALLERY/pujada island 1.jpg" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-media gal-hero-media--bc" aria-hidden="true">
        <img src="data/GALLERY/DJI_0812.jpg" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-media gal-hero-media--coconut" aria-hidden="true">
        <img src="data/GALLERY/coconut%20-%20Copy.png" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-media gal-hero-media--bl" aria-hidden="true">
        <img src="data/GALLERY/Background1.png" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-media gal-hero-media--d" aria-hidden="true">
        <img src="data/GALLERY/d.jpg" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-media gal-hero-media--design2" aria-hidden="true">
        <img src="data/GALLERY/design2.png" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-media gal-hero-media--design3" aria-hidden="true">
        <img src="data/GALLERY/design3.png" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-b-stack" aria-hidden="true">
        <div class="gal-hero-b-stack__piece gal-hero-b-stack__piece--top">
          <img src="data/GALLERY/b.jpg" alt="" loading="eager" decoding="async" />
        </div>
        <div class="gal-hero-b-stack__piece gal-hero-b-stack__piece--mid">
          <img src="data/GALLERY/b.jpg" alt="" loading="eager" decoding="async" />
        </div>
        <div class="gal-hero-b-stack__piece gal-hero-b-stack__piece--back">
          <img src="data/GALLERY/b.jpg" alt="" loading="eager" decoding="async" />
        </div>
        <div class="gal-hero-b-stack__piece gal-hero-b-stack__piece--back">
          <img src="data/GALLERY/b.jpg" alt="" loading="eager" decoding="async" />
        </div>
      </div>
      <div class="gal-hero-c-stack" aria-hidden="true">
        <div class="gal-hero-c-stack__piece gal-hero-c-stack__piece--top">
          <img src="data/GALLERY/c.jpg" alt="" loading="eager" decoding="async" />
        </div>
        <div class="gal-hero-c-stack__piece gal-hero-c-stack__piece--mid">
          <img src="data/GALLERY/c.jpg" alt="" loading="eager" decoding="async" />
        </div>
        <div class="gal-hero-c-stack__piece gal-hero-c-stack__piece--back">
          <img src="data/GALLERY/c.jpg" alt="" loading="eager" decoding="async" />
        </div>
        <div class="gal-hero-c-stack__piece gal-hero-c-stack__piece--lower">
          <img src="data/GALLERY/c.jpg" alt="" loading="eager" decoding="async" />
        </div>
      </div>
      <div class="gal-hero-media gal-hero-media--logo" aria-hidden="true">
        <img src="data/GALLERY/logo.jpg" alt="" loading="eager" decoding="async" />
      </div>
      <div class="gal-hero-inner">
        <div class="gal-hero-title-stack">
          <div class="gal-hero-media gal-hero-media--design4" aria-hidden="true">
            <img src="data/GALLERY/design4.JPG" alt="" loading="eager" decoding="async" />
          </div>
          <h1 class="gal-hero-title" data-text="Gallery">Gallery</h1>
        </div>
      </div>
      </div>
      <div class="gal-hero-reveal-curtain" aria-hidden="true"></div>
    </header>

    <main class="gal-explorer" id="galExplorer">
      <div class="gal-panel" id="galPanel"></div>
    </main>

    <div class="gal-lightbox" id="galLightbox" role="dialog" aria-modal="true" aria-label="Media viewer">
      <div class="gal-lightbox-backdrop" aria-hidden="true"></div>
      <button type="button" class="gal-lightbox-close" id="galLightboxClose" aria-label="Close">&times;</button>
      <button type="button" class="gal-lightbox-nav prev" id="galLightboxPrev" aria-label="Previous photograph">
        <span class="gal-lightbox-nav__icon" aria-hidden="true">&lsaquo;</span>
        <span class="gal-lightbox-nav__label">Previous</span>
      </button>
      <button type="button" class="gal-lightbox-nav next" id="galLightboxNext" aria-label="Next photograph">
        <span class="gal-lightbox-nav__label">Next</span>
        <span class="gal-lightbox-nav__icon" aria-hidden="true">&rsaquo;</span>
      </button>
      <div class="gal-lightbox-inner">
        <div class="gal-lightbox-stage">
          <div class="gal-lightbox-frame">
            <div class="gal-lightbox-media" id="galLightboxMedia"></div>
          </div>
        </div>
        <div class="gal-lightbox-caption">
          <h3 id="galLightboxTitle"></h3>
          <p id="galLightboxMeta"></p>
          <div class="gal-lightbox-citation" id="galLightboxCitation" hidden></div>
        </div>
      </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="gallery-data.js"></script>
    <script src="gallery-app.js"></script>
  </body>
</html>
