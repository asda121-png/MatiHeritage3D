<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spot the Difference - Mati Heritage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Rajdhani", sans-serif;
        background: #020512;
        color: white;
        overflow-x: hidden;
      }
      .orbitron {
        font-family: "Orbitron", sans-serif;
      }

      .hero-bg {
        background:
          linear-gradient(rgba(2, 5, 18, 0.7), rgba(2, 5, 18, 0.9)),
          url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1600");
        background-size: cover;
        background-position: center;
        min-height: 100vh;
      }

      .glass-card {
        background: rgba(6, 11, 25, 0.9);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .img-container {
        position: relative;
        cursor: crosshair;
        user-select: none;
        overflow: hidden;
        border: 2px solid rgba(255, 255, 255, 0.1);
      }

      .difference-marker {
        position: absolute;
        width: 40px;
        height: 40px;
        border: 3px solid #22c55e;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        animation: pulse-marker 1s ease-out;
        box-shadow: 0 0 15px #22c55e;
      }

      @keyframes pulse-marker {
        0% {
          transform: translate(-50%, -50%) scale(2);
          opacity: 0;
        }
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
      }

      .diff-btn {
        transition: all 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder" class="min-h-[90px]"></div>

    <main
      class="hero-bg flex flex-col items-center justify-center pt-24 pb-12 px-2"
    >
      <!-- INTRO SCREEN -->
      <div
        id="intro-screen"
        class="w-full max-w-2xl glass-card rounded-3xl p-10 text-center z-20"
      >
        <h1
          class="text-4xl font-black orbitron mb-6 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500"
        >
          SPOT THE DIFFERENCE
        </h1>
        <p class="text-gray-300 text-lg mb-8">
          Test your observation skills. Can you find all the differences between
          these two images of Mati's heritage landmarks?
        </p>

        <div class="flex flex-wrap justify-center gap-4 mb-10">
          <button
            onclick="setDifficulty('easy')"
            id="btn-easy"
            class="diff-btn px-6 py-2 rounded-full border border-white/10 orbitron text-xs tracking-widest hover:border-cyan-400"
          >
            EASY
          </button>
          <button
            onclick="setDifficulty('medium')"
            id="btn-medium"
            class="diff-btn px-6 py-2 rounded-full border border-cyan-400 bg-cyan-400/20 orbitron text-xs tracking-widest"
          >
            MEDIUM
          </button>
          <button
            onclick="setDifficulty('hard')"
            id="btn-hard"
            class="diff-btn px-6 py-2 rounded-full border border-white/10 orbitron text-xs tracking-widest hover:border-purple-500"
          >
            HARD
          </button>
        </div>

        <button
          id="start-btn"
          class="orbitron bg-cyan-500 text-black px-12 py-4 rounded-full font-bold tracking-widest hover:bg-white transition-all shadow-[0_0_20px_rgba(34,211,238,0.3)]"
        >
          START GAME
        </button>
      </div>

      <!-- GAME SCREEN -->
      <div id="game-screen" class="hidden w-full max-w-[98vw] z-20">
        <!-- HUD Stats -->
        <div class="flex flex-wrap justify-center gap-4 md:gap-8 mb-6">
          <div
            class="glass-card px-6 py-2 rounded-xl border-b-2 border-cyan-500 flex flex-col items-center"
          >
            <span
              class="text-[10px] text-gray-400 uppercase font-bold tracking-widest"
              >Differences Found</span
            >
            <div class="flex items-center gap-1">
              <span id="found-count" class="text-2xl font-black orbitron"
                >0</span
              >
              <span class="text-gray-500 text-sm orbitron">/</span>
              <span id="total-diffs" class="text-gray-500 text-sm orbitron"
                >5</span
              >
            </div>
          </div>

          <div
            class="glass-card px-6 py-2 rounded-xl border-b-2 border-red-500 flex flex-col items-center"
          >
            <span
              class="text-[10px] text-gray-400 uppercase font-bold tracking-widest"
              >Timer</span
            >
            <span
              id="timer-display"
              class="text-2xl font-black orbitron text-red-400"
              >60s</span
            >
          </div>

          <div
            class="glass-card px-6 py-2 rounded-xl border-b-2 border-purple-500 flex flex-col items-center"
          >
            <span
              class="text-[10px] text-gray-400 uppercase font-bold tracking-widest"
              >Score</span
            >
            <span id="score-display" class="text-2xl font-black orbitron"
              >0</span
            >
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
          <div
            class="img-container rounded-2xl bg-black shadow-2xl"
            id="panel-1"
          >
            <img id="img-1" src="" class="w-full h-auto" />
            <div
              class="absolute top-4 left-4 bg-black/60 px-3 py-1 rounded-md text-[10px] orbitron border border-white/20"
            >
              ORIGINAL
            </div>
          </div>
          <div
            class="img-container rounded-2xl bg-black shadow-2xl"
            id="panel-2"
          >
            <img id="img-2" src="" class="w-full h-auto" />
            <div
              class="absolute top-4 left-4 bg-black/60 px-3 py-1 rounded-md text-[10px] orbitron border border-white/20"
            >
              FIND THE DIFFERENCE
            </div>
          </div>
        </div>
      </div>

      <!-- RESULTS SCREEN -->
      <div
        id="results-screen"
        class="hidden w-full max-w-2xl glass-card rounded-3xl p-10 text-center z-20"
      >
        <h2 class="orbitron text-3xl font-bold mb-4">GAME OVER</h2>
        <div
          class="text-6xl font-black orbitron mb-4 text-cyan-400"
          id="final-score"
        >
          0
        </div>
        <p class="text-gray-400 mb-8" id="result-msg">
          Well done! You have a great eye for detail.
        </p>
        <div class="flex flex-col md:flex-row gap-4 justify-center">
          <button
            onclick="location.reload()"
            class="bg-white text-black px-8 py-3 rounded-full orbitron font-bold tracking-widest hover:bg-cyan-400"
          >
            PLAY AGAIN
          </button>
          <a
            href="game.html"
            class="border border-white/20 px-8 py-3 rounded-full orbitron font-bold tracking-widest hover:bg-white/10"
            >GAMES HUB</a
          >
        </div>
      </div>
    </main>

    <audio
      id="bg-music"
      src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3"
      loop
    ></audio>
    <audio
      id="click-sound"
      src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"
    ></audio>
    <audio
      id="correct-sfx"
      src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"
    ></audio>

    <script>
      // Load Header
      fetch("header.html")
        .then((res) => res.text())
        .then((data) => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(data, "text/html");
          document
            .getElementById("header-placeholder")
            .replaceWith(doc.querySelector("header"));
          const scriptText = Array.from(doc.scripts).find(
            (s) => !s.src,
          )?.textContent;
          if (scriptText) {
            const s = document.createElement("script");
            s.textContent = scriptText;
            document.body.appendChild(s);
          }
          document.getElementById("header-total-points").textContent =
            localStorage.getItem("totalHeritagePoints") || "0";
        });

      // Game Data - In a real app, img2 would be a slightly modified version of img1
      const levels = [
        {
          img: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1600",
          differences: [
            { x: 20, y: 30, found: false },
            { x: 50, y: 45, found: false },
            { x: 80, y: 20, found: false },
            { x: 35, y: 70, found: false },
            { x: 65, y: 85, found: false },
          ],
        },
      ];

      let currentDifficulty = "medium";
      const settings = {
        easy: { time: 90, points: 50, radius: 8 },
        medium: { time: 60, points: 100, radius: 5 },
        hard: { time: 45, points: 200, radius: 3 },
      };

      let score = 0;
      let found = 0;
      let timeLeft = 60;
      let timerInterval;
      let gameActive = false;

      const bgMusic = document.getElementById("bg-music");
      const clickSfx = document.getElementById("click-sound");
      const correctSfx = document.getElementById("correct-sfx");

      function setDifficulty(level) {
        currentDifficulty = level;
        document.querySelectorAll(".diff-btn").forEach((btn) => {
          btn.classList.remove(
            "bg-cyan-400/20",
            "border-cyan-400",
            "bg-purple-500/20",
            "border-purple-500",
          );
          btn.classList.add("border-white/10");
        });
        const active = document.getElementById(`btn-${level}`);
        active.classList.remove("border-white/10");
        const color =
          level === "hard" ? "border-purple-500" : "border-cyan-400";
        const bg = level === "hard" ? "bg-purple-500/20" : "bg-cyan-400/20";
        active.classList.add(color, bg);
      }

      function startTimer() {
        timerInterval = setInterval(() => {
          timeLeft--;
          document.getElementById("timer-display").textContent = `${timeLeft}s`;
          if (timeLeft <= 0) endGame("Time's up! Better luck next time.");
        }, 1000);
      }

      function handlePanelClick(e, panelId) {
        if (!gameActive) return;

        const rect = e.currentTarget.getBoundingClientRect();
        const clickX = ((e.clientX - rect.left) / rect.width) * 100;
        const clickY = ((e.clientY - rect.top) / rect.height) * 100;

        let hit = false;
        const radius = settings[currentDifficulty].radius;

        levels[0].differences.forEach((diff, idx) => {
          if (!diff.found) {
            const dist = Math.sqrt(
              Math.pow(clickX - diff.x, 2) + Math.pow(clickY - diff.y, 2),
            );
            if (dist < radius) {
              diff.found = true;
              hit = true;
              found++;
              score += settings[currentDifficulty].points;
              markDifference(diff.x, diff.y);
            }
          }
        });

        if (hit) {
          correctSfx.currentTime = 0;
          correctSfx.play();
          updateStats();
          if (found === levels[0].differences.length)
            endGame("Amazing! You found all the differences!");
        } else {
          clickSfx.currentTime = 0;
          clickSfx.play();
        }
      }

      function markDifference(x, y) {
        ["panel-1", "panel-2"].forEach((id) => {
          const marker = document.createElement("div");
          marker.className = "difference-marker";
          marker.style.left = `${x}%`;
          marker.style.top = `${y}%`;
          document.getElementById(id).appendChild(marker);
        });
      }

      function updateStats() {
        document.getElementById("found-count").textContent = found;
        document.getElementById("score-display").textContent = score;
      }

      function endGame(msg) {
        gameActive = false;
        clearInterval(timerInterval);
        document.getElementById("game-screen").classList.add("hidden");
        document.getElementById("results-screen").classList.remove("hidden");
        document.getElementById("final-score").textContent = score;
        document.getElementById("result-msg").textContent = msg;

        let total = parseInt(
          localStorage.getItem("totalHeritagePoints") || "0",
        );
        total += score;
        localStorage.setItem("totalHeritagePoints", total);
        document.getElementById("header-total-points").textContent = total;

        playAnnouncer(msg + " Your total score is " + score);
      }

      function playAnnouncer(text) {
        const sVol = parseFloat(localStorage.getItem("sfxVol") || "0.8");
        if (sVol > 0 && "speechSynthesis" in window) {
          const u = new SpeechSynthesisUtterance(text);
          u.volume = sVol;
          window.speechSynthesis.speak(u);
        }
      }

      document.getElementById("start-btn").onclick = () => {
        const mVol = parseFloat(localStorage.getItem("bgMusicVol") || "0.2");
        const sVol = parseFloat(localStorage.getItem("sfxVol") || "0.8");
        bgMusic.volume = mVol;
        clickSfx.volume = sVol;
        correctSfx.volume = sVol;
        if (mVol > 0) bgMusic.play();

        document.getElementById("intro-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");

        timeLeft = settings[currentDifficulty].time;
        document.getElementById("total-diffs").textContent =
          levels[0].differences.length;
        document.getElementById("img-1").src = levels[0].img;
        document.getElementById("img-2").src = levels[0].img; // In production, this is the modified image

        gameActive = true;
        startTimer();
        playAnnouncer("Game started. Find the differences!");
      };

      document.getElementById("panel-1").onclick = (e) =>
        handlePanelClick(e, "panel-1");
      document.getElementById("panel-2").onclick = (e) =>
        handlePanelClick(e, "panel-2");
    </script>
  </body>
</html>
