<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Matching Pairs - Mati Heritage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Rajdhani", sans-serif;
        background: #0f172a; /* Deep Slate - clean and professional */
        color: #f8fafc;
        overflow-x: hidden;
      }
      .orbitron {
        font-family: "Orbitron", sans-serif;
      }

      .gallery-bg {
        background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        min-height: 100vh;
      }

      .glass-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Memory Card Styles */
      .memory-card {
        aspect-ratio: 3/4;
        perspective: 1000px;
        cursor: pointer;
      }

      .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        transform-style: preserve-3d;
      }

      .memory-card.flipped .card-inner {
        transform: rotateY(180deg);
      }

      .card-front,
      .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 12px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }

      .card-back {
        background: #334155;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 10px,
          rgba(255, 255, 255, 0.02) 10px,
          rgba(255, 255, 255, 0.02) 20px
        );
      }

      .card-front {
        background: #f1f5f9;
        transform: rotateY(180deg);
      }

      .card-front img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .matched .card-inner {
        transform: rotateY(180deg) scale(0.95);
        opacity: 0.6;
      }

      .diff-btn {
        transition: all 0.3s ease;
      }

      .gold-accent {
        color: #f59e0b;
      }
      .gold-border {
        border-color: #f59e0b;
      }
      .gold-bg {
        background-color: #f59e0b;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder" class="min-h-[90px]"></div>

    <main
      class="gallery-bg flex flex-col items-center justify-center pt-24 pb-12 px-4"
    >
      <!-- INTRO SCREEN -->
      <div
        id="intro-screen"
        class="w-full max-w-2xl glass-card rounded-3xl p-10 text-center z-20"
      >
        <h1 class="text-4xl font-black orbitron mb-6 text-white tracking-tight">
          HERITAGE MATCHING
        </h1>
        <p class="text-slate-300 text-lg mb-8 leading-relaxed">
          Challenge your memory and discover the landmarks of Mati City. Pair
          the identical images before the clock runs out.
        </p>

        <div class="flex flex-wrap justify-center gap-4 mb-10">
          <button
            onclick="setDifficulty('easy')"
            id="btn-easy"
            class="diff-btn px-8 py-3 rounded-xl border border-white/10 orbitron text-xs tracking-widest hover:bg-white/5"
          >
            EASY (4x3)
          </button>
          <button
            onclick="setDifficulty('medium')"
            id="btn-medium"
            class="diff-btn px-8 py-3 rounded-xl border-2 gold-border gold-accent orbitron text-xs tracking-widest"
          >
            MEDIUM (4x4)
          </button>
          <button
            onclick="setDifficulty('hard')"
            id="btn-hard"
            class="diff-btn px-8 py-3 rounded-xl border border-white/10 orbitron text-xs tracking-widest hover:bg-white/5"
          >
            HARD (6x4)
          </button>
        </div>

        <button
          id="start-btn"
          class="orbitron gold-bg text-slate-900 px-16 py-4 rounded-xl font-bold tracking-widest hover:bg-white transition-all"
        >
          BEGIN GAME
        </button>
      </div>

      <!-- GAME SCREEN -->
      <div id="game-screen" class="hidden w-full max-w-5xl z-20">
        <div class="flex flex-wrap justify-between items-center mb-8 gap-4">
          <div class="flex gap-6">
            <div class="glass-card px-6 py-2 rounded-xl border-l-4 gold-border">
              <span
                class="text-[10px] text-slate-400 uppercase font-bold tracking-widest block"
                >Score</span
              >
              <span id="score-display" class="text-2xl font-black orbitron"
                >0</span
              >
            </div>
            <div
              class="glass-card px-6 py-2 rounded-xl border-l-4 border-slate-400"
            >
              <span
                class="text-[10px] text-slate-400 uppercase font-bold tracking-widest block"
                >Time Left</span
              >
              <span id="timer-display" class="text-2xl font-black orbitron"
                >45s</span
              >
            </div>
          </div>

          <div class="orbitron text-sm tracking-widest text-slate-400">
            PAIRS: <span id="pairs-count" class="text-white">0</span> /
            <span id="total-pairs">8</span>
          </div>
        </div>

        <div id="card-grid" class="grid gap-4 mx-auto">
          <!-- Cards injected here -->
        </div>
      </div>

      <!-- RESULTS SCREEN -->
      <div
        id="results-screen"
        class="hidden w-full max-w-2xl glass-card rounded-3xl p-10 text-center z-20"
      >
        <h2 class="orbitron text-3xl font-bold mb-4">GAME COMPLETE</h2>
        <div
          class="text-7xl font-black orbitron mb-4 gold-accent"
          id="final-score"
        >
          0
        </div>
        <p class="text-slate-400 mb-10 text-lg" id="result-msg">
          Exquisite performance!
        </p>

        <div class="flex flex-col md:flex-row gap-4 justify-center">
          <button
            onclick="location.reload()"
            class="bg-white text-slate-900 px-10 py-4 rounded-xl orbitron font-bold tracking-widest hover:bg-gold-accent"
          >
            REPLAY
          </button>
          <a
            href="game.html"
            class="border border-white/20 px-10 py-4 rounded-xl orbitron font-bold tracking-widest hover:bg-white/5"
          >
            BACK TO HUB
          </a>
        </div>
      </div>
    </main>

    <!-- AUDIO -->
    <audio
      id="bg-music"
      src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-14.mp3"
      loop
    ></audio>
    <audio
      id="click-sound"
      src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"
    ></audio>
    <audio
      id="correct-sfx"
      src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"
    ></audio>
    <audio
      id="wrong-sfx"
      src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"
    ></audio>

    <script>
      // Load Header
      fetch("header.html")
        .then((res) => res.text())
        .then((data) => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(data, "text/html");
          const header = doc.querySelector("header");
          document.getElementById("header-placeholder").replaceWith(header);

          // Inject header styles to ensure Settings modal looks correct
          const headerStyle = doc.querySelector("style");
          if (headerStyle) {
            document.head.appendChild(headerStyle.cloneNode(true));
          }

          // Extract and run the settings logic script
          const headerScript = Array.from(doc.scripts).find((s) => !s.src);
          if (headerScript) {
            const s = document.createElement("script");
            s.textContent = headerScript.textContent;
            document.body.appendChild(s);
          }

          document.getElementById("header-total-points").textContent =
            localStorage.getItem("totalHeritagePoints") || "0";
        });

      const heritageItems = [
        {
          name: "Sleeping Dinosaur",
          img: "https://images.unsplash.com/photo-1452421822248-d4c2b47f0c81?w=400",
        },
        {
          name: "Dahican Beach",
          img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400",
        },
        {
          name: "Subangan Museum",
          img: "https://images.unsplash.com/photo-1518998053502-51dd0c61cd2e?w=400",
        },
        {
          name: "Mt. Hamiguitan",
          img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400",
        },
        {
          name: "Waniban Island",
          img: "https://images.unsplash.com/photo-1559128010-7c1ad6e1b6a5?w=400",
        },
        {
          name: "Pujada Bay",
          img: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=400",
        },
        {
          name: "Mayo Bay",
          img: "https://images.unsplash.com/photo-1544124499-58912cbddaad?w=400",
        },
        {
          name: "Carmelite Monastery",
          img: "https://images.unsplash.com/photo-1516550893923-42d28e5677af?w=400",
        },
        {
          name: "Local Craft",
          img: "https://images.unsplash.com/photo-1513519245088-0e12902e5a38?w=400",
        },
        {
          name: "Dahican Surf",
          img: "https://images.unsplash.com/photo-1502680390469-be75c86b636f?w=400",
        },
        {
          name: "Heritage Artifact",
          img: "https://images.unsplash.com/photo-1533105079780-92b9be482077?w=400",
        },
        {
          name: "Mati Sunset",
          img: "https://images.unsplash.com/photo-1465189684280-6e8fa9b19a7a?w=400",
        },
      ];

      let difficulty = "medium";
      const config = {
        easy: { rows: 3, cols: 4, pairs: 6, time: 60, points: 100 },
        medium: { rows: 4, cols: 4, pairs: 8, time: 45, points: 150 },
        hard: { rows: 4, cols: 6, pairs: 12, time: 30, points: 200 },
      };

      let cards = [];
      let flippedCards = [];
      let matchedPairs = 0;
      let score = 0;
      let timeLeft = 0;
      let timerInterval;
      let gameActive = false;

      const bgMusic = document.getElementById("bg-music");
      const clickSfx = document.getElementById("click-sound");
      const correctSfx = document.getElementById("correct-sfx");
      const wrongSfx = document.getElementById("wrong-sfx");

      function setDifficulty(level) {
        difficulty = level;
        document.querySelectorAll(".diff-btn").forEach((btn) => {
          btn.className =
            "diff-btn px-8 py-3 rounded-xl border border-white/10 orbitron text-xs tracking-widest hover:bg-white/5";
        });
        const active = document.getElementById(`btn-${level}`);
        active.className =
          "diff-btn px-8 py-3 rounded-xl border-2 gold-border gold-accent orbitron text-xs tracking-widest";
      }

      function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
      }

      function createBoard() {
        const settings = config[difficulty];
        const grid = document.getElementById("card-grid");
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${settings.cols}, minmax(0, 1fr))`;
        grid.className = `grid gap-4 mx-auto w-full max-w-${difficulty === "hard" ? "5xl" : "3xl"}`;

        // Pick items and double them
        const items = shuffle([...heritageItems]).slice(0, settings.pairs);
        cards = shuffle([...items, ...items]);

        document.getElementById("total-pairs").textContent = settings.pairs;
        document.getElementById("pairs-count").textContent = "0";

        cards.forEach((item, index) => {
          const cardEl = document.createElement("div");
          cardEl.className = "memory-card";
          cardEl.dataset.name = item.name;
          cardEl.dataset.id = index;

          cardEl.innerHTML = `
            <div class="card-inner">
              <div class="card-back">
                <div class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center">
                  <span class="text-[10px] orbitron opacity-40">M</span>
                </div>
              </div>
              <div class="card-front">
                <img src="${item.img}" alt="${item.name}" loading="lazy">
              </div>
            </div>
          `;

          cardEl.addEventListener("click", () => flipCard(cardEl));
          grid.appendChild(cardEl);
        });
      }

      function flipCard(card) {
        if (
          !gameActive ||
          flippedCards.length >= 2 ||
          card.classList.contains("flipped") ||
          card.classList.contains("matched")
        )
          return;

        card.classList.add("flipped");
        flippedCards.push(card);
        clickSfx.currentTime = 0;
        clickSfx.play().catch(() => {});

        if (flippedCards.length === 2) {
          checkMatch();
        }
      }

      function checkMatch() {
        const [card1, card2] = flippedCards;
        const isMatch = card1.dataset.name === card2.dataset.name;

        if (isMatch) {
          handleMatch(card1, card2);
        } else {
          handleMismatch(card1, card2);
        }
      }

      function handleMatch(c1, c2) {
        matchedPairs++;
        score += config[difficulty].points;
        document.getElementById("score-display").textContent = score;
        document.getElementById("pairs-count").textContent = matchedPairs;

        flippedCards = [];
        correctSfx.currentTime = 0;
        correctSfx.play().catch(() => {});

        setTimeout(() => {
          c1.classList.add("matched");
          c2.classList.add("matched");
          if (matchedPairs === config[difficulty].pairs) endGame(true);
        }, 300);
      }

      function handleMismatch(c1, c2) {
        wrongSfx.currentTime = 0;
        wrongSfx.play().catch(() => {});

        setTimeout(() => {
          c1.classList.remove("flipped");
          c2.classList.remove("flipped");
          flippedCards = [];
        }, 1000);
      }

      function startTimer() {
        timeLeft = config[difficulty].time;
        document.getElementById("timer-display").textContent = `${timeLeft}s`;

        timerInterval = setInterval(() => {
          timeLeft--;
          document.getElementById("timer-display").textContent = `${timeLeft}s`;
          if (timeLeft <= 0) endGame(false);
        }, 1000);
      }

      function endGame(win) {
        gameActive = false;
        clearInterval(timerInterval);

        const finalBonus = win ? timeLeft * 50 : 0;
        const totalEarned = score + finalBonus;

        document.getElementById("game-screen").classList.add("hidden");
        document.getElementById("results-screen").classList.remove("hidden");
        document.getElementById("final-score").textContent = totalEarned;
        document.getElementById("result-msg").textContent = win
          ? "Magnificent memory! You paired them all."
          : "Time has slipped away. Try once more!";

        // Save Points
        let currentTotal = parseInt(
          localStorage.getItem("totalHeritagePoints") || "0",
        );
        localStorage.setItem("totalHeritagePoints", currentTotal + totalEarned);
        document.getElementById("header-total-points").textContent =
          currentTotal + totalEarned;

        playAnnouncer(
          win
            ? `Superb! You earned ${totalEarned} points.`
            : "Game over. Better luck next time.",
        );
      }

      function playAnnouncer(text) {
        const sVol = parseFloat(localStorage.getItem("sfxVol") || "0.8");
        if (sVol > 0 && "speechSynthesis" in window) {
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.volume = sVol;
          window.speechSynthesis.speak(u);
        }
      }

      document.getElementById("start-btn").onclick = () => {
        const mVol = parseFloat(localStorage.getItem("bgMusicVol") || "0.2");
        const sVol = parseFloat(localStorage.getItem("sfxVol") || "0.8");
        bgMusic.volume = mVol;
        clickSfx.volume = sVol;
        correctSfx.volume = sVol;
        wrongSfx.volume = sVol;

        if (mVol > 0) bgMusic.play().catch(() => {});

        document.getElementById("intro-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");

        createBoard();
        gameActive = true;
        startTimer();
        playAnnouncer("Find the pairs!");
      };
    </script>
  </body>
</html>
