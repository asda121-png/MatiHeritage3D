<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — Mati Heritage 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-body">
    <div class="auth-page">
      <aside class="auth-brand" id="auth-brand" aria-label="Mati Heritage showcase"></aside>

      <section class="auth-panel">
        <header class="auth-panel-top">
          <a href="index.html" class="auth-panel-back">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Visitor portal
          </a>
          <nav class="auth-switch" aria-label="Account navigation">
            <a href="login.html" class="is-active" aria-current="page">Sign in</a>
            <a href="userregistration.html">Register</a>
          </nav>
        </header>

        <main class="auth-panel-main">
          <div class="auth-form-wrap">
            <header class="auth-form-header">
              <p class="auth-form-kicker"><span class="auth-form-kicker-dot" aria-hidden="true"></span> Games Hub access</p>
              <h1 class="auth-form-title">Welcome back</h1>
              <p class="auth-form-sub">Sign in to continue your heritage learning journey.</p>
            </header>

            <form id="login-form" class="auth-form">
              <div class="auth-field auth-field--icon">
                <input id="login-identifier" type="text" autocomplete="username" placeholder=" " />
                <label for="login-identifier">Email or username</label>
                <svg class="auth-field-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>

              <div class="auth-field auth-field--icon auth-field--toggle">
                <input id="login-password" type="password" autocomplete="current-password" placeholder=" " />
                <label for="login-password">Password</label>
                <svg class="auth-field-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <button type="button" id="toggle-password" class="auth-field-toggle" aria-label="Show password">
                  <svg id="eye-open" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                  </svg>
                  <svg id="eye-closed" class="hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                  </svg>
                </button>
              </div>

              <div class="auth-row">
                <label class="auth-check">
                  <input type="checkbox" id="login-remember" checked />
                  <span>Keep me signed in</span>
                </label>
              </div>

              <button type="button" class="auth-submit"><span>Sign in to Games Hub</span></button>
            </form>

            <p class="auth-form-footer">
              New here? <a href="userregistration.html">Create a free account</a>
            </p>
          </div>
        </main>

        <footer class="auth-panel-foot">Mati Heritage 3D · Capstone Project</footer>
      </section>
    </div>

    <script src="auth-brand.js"></script>
    <script src="auth-ui.js"></script>
    <script>
      MatiAuthUI.bindPasswordToggle("login-password", "toggle-password", "eye-open", "eye-closed");
    </script>
  </body>
</html>
