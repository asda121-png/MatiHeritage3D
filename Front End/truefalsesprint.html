<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>True or False Sprint - Mati Heritage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Rajdhani", sans-serif;
        background: #020512;
        color: white;
        overflow-x: hidden;
      }
      .orbitron {
        font-family: "Orbitron", sans-serif;
      }
      .hero-bg {
        background:
          linear-gradient(rgba(2, 5, 18, 0.4), rgba(2, 5, 18, 0.65)),
          url("https://images.unsplash.com/photo-1544124499-58912cbddaad?w=1600"),
          #020512;
        background-size: cover;
        background-position: center;
        min-height: 100vh;
      }
      .glass-card {
        background: rgba(6, 11, 25, 0.9);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .sprint-btn {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        text-transform: uppercase;
        letter-spacing: 0.2em;
      }
      .sprint-btn:active {
        transform: scale(0.95);
      }
      .btn-true {
        background: rgba(34, 197, 94, 0.1);
        border: 2px solid rgba(34, 197, 94, 0.4);
      }
      .btn-true:hover {
        background: rgba(34, 197, 94, 0.2);
        border-color: #22c55e;
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
      }
      .btn-false {
        background: rgba(239, 68, 68, 0.1);
        border: 2px solid rgba(239, 68, 68, 0.4);
      }
      .btn-false:hover {
        background: rgba(239, 68, 68, 0.2);
        border-color: #ef4444;
        box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
      }
      .timer-bar {
        transition: width 0.1s linear;
      }
      .diff-btn {
        transition: all 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder" class="min-h-[90px]"></div>

    <main
      class="hero-bg flex flex-col items-center justify-center pt-24 pb-12 px-4"
    >
      <!-- INTRO SCREEN -->
      <div
        id="intro-screen"
        class="w-full max-w-2xl glass-card rounded-3xl p-10 text-center z-20"
      >
        <h1
          class="text-4xl font-black orbitron mb-6 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-500"
        >
          TRUE OR FALSE SPRINT
        </h1>
        <p class="text-gray-300 text-lg mb-8">
          Mati City's history and culture. Rapid fire! You have 5 seconds per
          fact. Choose your difficulty and start!
        </p>

        <!-- Difficulty Selector -->
        <div class="flex flex-wrap justify-center gap-4 mb-10">
          <button
            onclick="setDifficulty('easy')"
            id="btn-easy"
            class="diff-btn px-6 py-2 rounded-full border border-white/10 orbitron text-xs tracking-widest hover:border-orange-400"
          >
            EASY
          </button>
          <button
            onclick="setDifficulty('medium')"
            id="btn-medium"
            class="diff-btn px-6 py-2 rounded-full border border-orange-400 bg-orange-400/20 orbitron text-xs tracking-widest"
          >
            MEDIUM
          </button>
          <button
            onclick="setDifficulty('hard')"
            id="btn-hard"
            class="diff-btn px-6 py-2 rounded-full border border-white/10 orbitron text-xs tracking-widest hover:border-red-500"
          >
            HARD
          </button>
        </div>

        <button
          id="start-btn"
          class="orbitron bg-white text-black px-12 py-4 rounded-full font-bold tracking-widest hover:bg-orange-400 transition-colors"
        >
          START SPRINT
        </button>
      </div>

      <!-- GAME SCREEN -->
      <div
        id="game-screen"
        class="hidden w-full max-w-2xl glass-card rounded-3xl p-8 z-20"
      >
        <div class="flex justify-between items-center mb-8">
          <div class="orbitron text-cyan-400 tracking-widest text-sm">
            SCORE: <span id="score-val">0</span>
          </div>
          <div class="orbitron text-red-400 tracking-widest text-sm">
            BEST: <span id="best-val">0</span>
          </div>
        </div>

        <div class="w-full h-2 bg-white/10 rounded-full mb-12 overflow-hidden">
          <div
            id="timer-fill"
            class="timer-bar h-full bg-emerald-500 w-full shadow-[0_0_15px_rgba(16,185,129,0.5)]"
          ></div>
        </div>

        <div
          class="text-center min-h-[150px] flex items-center justify-center mb-12"
        >
          <h2
            id="fact-text"
            class="text-2xl md:text-3xl font-bold leading-relaxed"
          >
            Loading fact...
          </h2>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <button
            id="true-btn"
            class="sprint-btn btn-true py-6 rounded-2xl orbitron font-bold text-xl"
          >
            TRUE
          </button>
          <button
            id="false-btn"
            class="sprint-btn btn-false py-6 rounded-2xl orbitron font-bold text-xl"
          >
            FALSE
          </button>
        </div>
      </div>

      <!-- RESULTS SCREEN -->
      <div
        id="results-screen"
        class="hidden w-full max-w-2xl glass-card rounded-3xl p-10 text-center z-20"
      >
        <h2 class="orbitron text-3xl font-bold mb-4">SPRINT OVER</h2>
        <div
          class="text-6xl font-black orbitron mb-4 text-emerald-400"
          id="final-score"
        >
          0
        </div>
        <p class="text-gray-400 mb-8" id="result-msg">
          Keep exploring Mati's rich heritage!
        </p>
        <div class="flex flex-col md:flex-row gap-4 justify-center">
          <button
            onclick="location.reload()"
            class="bg-white text-black px-8 py-3 rounded-full orbitron font-bold tracking-widest hover:bg-cyan-400"
          >
            RETRY
          </button>
          <a
            href="game.html"
            class="border border-white/20 px-8 py-3 rounded-full orbitron font-bold tracking-widest hover:bg-white/10"
            >GAMES HUB</a
          >
        </div>
      </div>
    </main>

    <audio
      id="bg-music"
      src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
      loop
    ></audio>
    <audio
      id="click-sound"
      src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"
      preload="auto"
    ></audio>
    <audio
      id="correct-sfx"
      src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"
    ></audio>
    <audio
      id="wrong-sfx"
      src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"
    ></audio>

    <script>
      // Load header logic
      fetch("header.html")
        .then((res) => res.text())
        .then((data) => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(data, "text/html");
          const header = doc.querySelector("header");
          document.getElementById("header-placeholder").replaceWith(header);
          const headerStyle = doc.querySelector("style");
          if (headerStyle)
            document.head.appendChild(headerStyle.cloneNode(true));
          const headerScript = Array.from(doc.scripts).find((s) => !s.src);
          if (headerScript) {
            const script = document.createElement("script");
            script.textContent = headerScript.textContent;
            document.body.appendChild(script);
          }
          document.getElementById("header-total-points").textContent =
            localStorage.getItem("totalHeritagePoints") || "0";
        });

      const facts = [
        { t: "The Sleeping Dinosaur is located in Pujada Bay.", a: true },
        { t: "Dahican Beach is famous for its black sand.", a: false },
        {
          t: "Subangan Museum houses a 50-foot sperm whale skeleton.",
          a: true,
        },
        { t: "Mati City is the capital of Davao Oriental.", a: true },
        { t: "Sambuokan Festival is a celebration in Mati City.", a: true },
        { t: "Mount Hamiguitan is a UNESCO World Heritage Site.", a: true },
        { t: "Waniban Island is located within the Davao Gulf.", a: false },
        { t: "The word 'Mati' comes from the Mandaya word 'Maa-ti'.", a: true },
        { t: "Dahican is known for its sea cow (Dugong) sightings.", a: true },
        {
          t: "Pujada Bay is recognized as one of the Most Beautiful Bays in the World.",
          a: true,
        },
        { t: "The Carmelite Monastery is located in Mati City.", a: true },
        { t: "Mati was founded as a city in 1950.", a: false }, // 2007
        { t: "The city celebrates its foundation day on June 19.", a: true },
        { t: "Mati is the only city in Davao Oriental.", a: true },
        {
          t: "Dahican Beach is the skimming capital of the Philippines.",
          a: true,
        },
      ];

      let difficulty = "medium";
      const diffSettings = {
        easy: { baseTime: 7000, points: 10 },
        medium: { baseTime: 5000, points: 20 },
        hard: { baseTime: 3000, points: 50 },
      };

      let currentScore = 0;
      let correctCount = 0; // Tracks consecutive correct answers for speed reduction
      let bestScore = parseInt(localStorage.getItem("tfSprintBest") || "0");
      let gameActive = false;
      let timeLeft = diffSettings[difficulty].baseTime;
      let timerInterval;
      let currentFact;

      window.setDifficulty = (level) => {
        difficulty = level;
        document.querySelectorAll(".diff-btn").forEach((btn) => {
          btn.classList.remove(
            "bg-orange-400/20",
            "border-orange-400",
            "bg-red-500/20",
            "border-red-500",
          );
          btn.classList.add("border-white/20");
        });

        const activeBtn = document.getElementById(`btn-${level}`);
        activeBtn.classList.remove("border-white/20");
        const colorClass =
          level === "hard" ? "bg-red-500/20" : "bg-orange-400/20";
        const borderClass =
          level === "hard" ? "border-red-500" : "border-orange-400";
        activeBtn.classList.add(colorClass, borderClass);
      };

      const bgMusic = document.getElementById("bg-music");
      const clickSfx = document.getElementById("click-sound");
      const correctSfx = document.getElementById("correct-sfx");
      const wrongSfx = document.getElementById("wrong-sfx");

      document.getElementById("best-val").textContent = bestScore;

      function updateVolumes() {
        const mVol = parseFloat(localStorage.getItem("bgMusicVol") || "0.2");
        const sVol = parseFloat(localStorage.getItem("sfxVol") || "0.8");
        bgMusic.volume = mVol;
        clickSfx.volume = sVol;
        correctSfx.volume = sVol;
        wrongSfx.volume = sVol;
      }

      function playAnnouncer(text) {
        const sVol = parseFloat(localStorage.getItem("sfxVol") || "0.8");
        if (sVol > 0 && "speechSynthesis" in window) {
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          const voices = window.speechSynthesis.getVoices();
          const v = voices.find(
            (v) =>
              v.name.includes("Google US English") ||
              v.name.includes("Samantha") ||
              v.lang.startsWith("en"),
          );
          if (v) u.voice = v;
          u.volume = sVol;
          window.speechSynthesis.speak(u);
        }
      }

      function nextFact() {
        currentFact = facts[Math.floor(Math.random() * facts.length)];
        document.getElementById("fact-text").textContent = currentFact.t;
        resetTimer();
      }

      function resetTimer() {
        clearInterval(timerInterval);
        // Speed up as player gets more correct answers
        const base = diffSettings[difficulty].baseTime;
        const reduction = Math.min(correctCount * 200, base * 0.5);
        timeLeft = base - reduction;
        const maxTime = timeLeft;

        timerInterval = setInterval(() => {
          timeLeft -= 100;
          const percent = (timeLeft / maxTime) * 100;
          document.getElementById("timer-fill").style.width = percent + "%";

          if (timeLeft <= 0) {
            gameOver("Time's up!");
          }
        }, 100);
      }

      function handleAnswer(ans) {
        if (!gameActive) return;

        if (ans === currentFact.a) {
          correctCount++;
          currentScore += diffSettings[difficulty].points;
          document.getElementById("score-val").textContent = currentScore;
          correctSfx.currentTime = 0;
          correctSfx.play().catch(() => {});
          nextFact();
        } else {
          gameOver("Oops! Wrong answer.");
        }
      }

      function gameOver(reason) {
        gameActive = false;
        clearInterval(timerInterval);
        wrongSfx.play().catch(() => {});

        document.getElementById("game-screen").classList.add("hidden");
        document.getElementById("results-screen").classList.remove("hidden");
        document.getElementById("final-score").textContent = currentScore;
        document.getElementById("result-msg").textContent = reason;

        if (currentScore > bestScore) {
          localStorage.setItem("tfSprintBest", currentScore);
          document.getElementById("result-msg").textContent =
            "New Personal Best! " + reason;
        }

        // Global points
        let total = parseInt(
          localStorage.getItem("totalHeritagePoints") || "0",
        );
        total += currentScore * 10;
        localStorage.setItem("totalHeritagePoints", total);
        document.getElementById("header-total-points").textContent = total;

        playAnnouncer(
          "Sprint complete. You scored " + currentScore + " points.",
        );
      }

      document.getElementById("start-btn").onclick = () => {
        updateVolumes();
        if (bgMusic.paused) bgMusic.play().catch(() => {});

        document.getElementById("intro-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");

        gameActive = true;
        currentScore = 0;
        correctCount = 0;
        document.getElementById("score-val").textContent = "0";

        playAnnouncer("Ready? Sprint!");
        nextFact();
      };

      document.getElementById("true-btn").onclick = () => handleAnswer(true);
      document.getElementById("false-btn").onclick = () => handleAnswer(false);

      // Keyboard support
      document.addEventListener("keydown", (e) => {
        if (!gameActive) return;
        if (e.key === "ArrowLeft") handleAnswer(true);
        if (e.key === "ArrowRight") handleAnswer(false);
      });
    </script>
  </body>
</html>
